name: Publish Windows Installer

# Builds the Windows installer and publishes it as a downloadable GitHub
# release asset whenever the "publish" branch is updated. The Squirrel
# installer filename is fixed (no version) in forge.config.ts, and this
# workflow always (re-)creates the same "latest" release/tag, so the
# stable URL below always serves the newest build:
#
#   https://github.com/<owner>/<repo>/releases/latest/download/NI-Installation-Manager-Setup.exe
#
# NOTE: the release tag must NOT be named like an existing branch — a tag
# named "publish" (same as the trigger branch) makes the GitHub release
# API fail with an HTML 500 ("Unicorn!") on fetch/create.

on:
  push:
    branches:
      - publish

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # No --targets flag: passing the package name ("@electron-forge/maker-squirrel")
      # makes Forge instantiate a fresh maker WITHOUT the config from forge.config.ts,
      # so setupExe would be ignored and the exe gets a versioned default name.
      # Plain `make` runs only the Squirrel maker on Windows anyway (zip is darwin-only,
      # deb/rpm are linux-only).
      - name: Build Windows installer
        run: npm run make

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest Windows Build
          make_latest: true
          fail_on_unmatched_files: true
          files: out/make/squirrel.windows/x64/NI-Installation-Manager-Setup.exe
