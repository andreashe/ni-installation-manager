name: Publish Windows Installer

# Builds the Windows installer and publishes it as a downloadable GitHub
# release asset whenever the "publish" branch is updated. The Squirrel
# installer filename is fixed (no version) in forge.config.ts, and this
# workflow always (re-)creates the same "publish" release/tag, so the
# stable URL below always serves the newest build:
#
#   https://github.com/<owner>/<repo>/releases/latest/download/NI-Installation-Manager-Setup.exe

on:
  push:
    branches:
      - publish

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run make -- --targets=@electron-forge/maker-squirrel

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: publish
          name: Latest Windows Build
          make_latest: true
          files: out/make/squirrel.windows/x64/NI-Installation-Manager-Setup.exe
