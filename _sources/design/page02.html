    // would push the parser into quirks mode. DOMParser always emits a <head>

ex;align-items:center;gap:11px;padding:0 26px 40px;\">\n      <span style=\"font-weight:700;font-size:35px;line-height:26px;letter-spacing:0.5px;color:#fff;\">NI<\u002Fspan>\n      <span style=\"display:flex;flex-direction:column;font-weight:500;font-size:11px;line-height:13px;letter-spacing:1.6px;color:#9a9a9e;text-transform:uppercase;\">\n        <span>Installation<\u002Fspan><span>Manager<\u002Fspan>\n      <\u002Fspan>\n    <\u002Fdiv>\n\n    <nav style=\"display:flex;flex-direction:column;gap:4px;padding:0 14px;\">\n      <div style=\"display:flex;align-items:center;gap:14px;padding:11px 12px;border-radius:6px;color:#9a9a9e;cursor:pointer;\" style-hover=\"background:#161618;color:#e8e8ea;\">\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><\u002Fsvg>\n        <span style=\"font-size:15px;\">Home<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;padding:11px 12px;border-radius:6px;background:#18181b;color:#fff;cursor:pointer;\">\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\"><path d=\"M3 6h18\"><\u002Fpath><path d=\"M8 6V4.5A1.5 1.5 0 0 1 9.5 3h5A1.5 1.5 0 0 1 16 4.5V6\"><\u002Fpath><path d=\"M6 6l1 13.5A1.5 1.5 0 0 0 8.5 21h7a1.5 1.5 0 0 0 1.5-1.5L18 6\"><\u002Fpath><path d=\"M10 11v5\"><\u002Fpath><path d=\"M14 11v5\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-size:15px;font-weight:500;\">Uninstall<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fnav>\n\n    <div style=\"flex:1;\"><\u002Fdiv>\n\n    <div style=\"padding:0 14px;\">\n      <div style=\"display:flex;align-items:center;gap:14px;padding:11px 12px;border-radius:6px;color:#9a9a9e;cursor:pointer;\" style-hover=\"background:#161618;color:#e8e8ea;\">\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-size:15px;\">Preferences<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- RIGHT CONTENT (scales) -->\n  <main style=\"flex:1;min-width:0;display:flex;flex-direction:column;background:#0e0e0f;\">\n\n    <!-- Header -->\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:30px 40px 18px;\">\n      <h1 style=\"margin:0;font-size:30px;font-weight:600;color:#fff;letter-spacing:-0.3px;\">Uninstall<\u002Fh1>\n      <button onclick=\"{{ reload }}\" title=\"Reload\" aria-label=\"Reload\" style=\"display:flex;align-items:center;justify-content:center;width:40px;height:40px;border:none;background:transparent;color:#9a9a9e;border-radius:8px;cursor:pointer;\" style-hover=\"background:#18181b;color:#fff;\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" style=\"{{ spinStyle }}\"><path d=\"M21 12a9 9 0 1 1-2.64-6.36\"><\u002Fpath><path d=\"M21 3v6h-6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Select-all bar -->\n    <div style=\"display:flex;align-items:center;gap:14px;padding:10px 40px;border-top:1px solid #1c1c1e;border-bottom:1px solid #1c1c1e;background:#0b0b0c;\">\n      <label style=\"display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;\">\n        <span onclick=\"{{ toggleAll }}\" style=\"{{ allBoxStyle }}\">{{ allMark }}<\u002Fspan>\n        <span style=\"font-size:13.5px;color:#b6b6ba;font-weight:500;\">{{ selectLabel }}<\u002Fspan>\n      <\u002Flabel>\n      <span style=\"font-size:13px;color:#6a6a6e;margin-left:6px;\">{{ countLabel }}<\u002Fspan>\n      <div style=\"position:relative;display:flex;align-items:center;margin-left:18px;width:240px;\">\n        <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6a6a6e\" stroke-width=\"2\" style=\"position:absolute;left:11px;pointer-events:none;\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n        <input value=\"{{ query }}\" oninput=\"{{ onSearch }}\" placeholder=\"Search products\" style=\"width:100%;height:32px;padding:0 32px 0 32px;background:#161618;border:1px solid #26262a;border-radius:6px;color:#e8e8ea;font-size:13px;font-family:inherit;outline:none;\" style-focus=\"border-color:#3b6fe0;\">\n        <span onclick=\"{{ clearSearch }}\" style=\"{{ clearBtnStyle }}\" title=\"Clear\">\n          <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M18 6L6 18\"><\u002Fpath><path d=\"M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex:1;\"><\u002Fdiv>\n      <button onclick=\"{{ uninstallSelected }}\" style=\"{{ bulkBtnStyle }}\">Uninstall selected<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Scrollable list -->\n    <div style=\"flex:1;overflow-y:auto;overflow-x:hidden;\">\n      <sc-for list=\"{{ products }}\" as=\"p\">\n        <div onclick=\"{{ p.toggle }}\" style=\"display:flex;align-items:center;gap:20px;padding:0 40px;height:104px;border-bottom:1px solid #161617;cursor:pointer;\" style-hover=\"background:#141416;\">\n          <span style=\"{{ p.boxStyle }}\">{{ p.mark }}<\u002Fspan>\n          <div style=\"flex:0 0 168px;width:168px;height:82px;border-radius:4px;overflow:hidden;background:#1a1a1c;\">{{ p.thumb }}<\u002Fdiv>\n          <div style=\"flex:1;min-width:0;font-size:16px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ p.name }}<\u002Fdiv>\n          <div style=\"flex:0 0 70px;font-size:14px;color:#8a8a8e;text-align:right;\">{{ p.version }}<\u002Fdiv>\n          <div style=\"flex:0 0 80px;font-size:14px;color:#8a8a8e;text-align:right;\">{{ p.size }}<\u002Fdiv>\n          <button onclick=\"{{ p.uninstall }}\" style=\"flex:0 0 auto;margin-left:24px;padding:9px 26px;background:#1f1f22;border:1px solid #2c2c30;border-radius:6px;color:#e8e8ea;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;\" style-hover=\"background:#2a2a2e;border-color:#3a3a3e;\">Uninstall<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { products: this.seed(), checked: {}, spinning: false, query: \"\" };\n\n  seed() {\n    const data = [\n      [\"Duets\", \"2.0.1\", \"798 KB\", \"art/duets.png\"],\n      [\"Electric Keys - Diamond\", \"1.2.1\", \"4.29 GB\", \"art/ek-diamond.png\"],\n      [\"Electric Keys - Phoenix\", \"1.2.1\", \"4.29 GB\", \"art/ek-phoenix.png\"],\n      [\"Glade\", \"1.1.0\", \"4.61 GB\", \"art/glade.png\"],\n      [\"Kontakt 8\", \"8.11.0\", \"1.19 GB\", \"art/kontakt8.png\"],\n      [\"Massive X\", \"1.7.1\", \"890 MB\", \"art/massivex.png\"],\n      [\"Raum\", \"1.3.7\", \"55 MB\", \"art/raum.png\"],\n      [\"RC 24\", \"1.4.11\", \"36 MB\", \"art/rc24.png\"],\n      [\"RC 48\", \"1.4.11\", \"33 MB\", \"art/rc48.png\"],\n      [\"Replika\", \"1.6.7\", \"112 MB\", \"art/replika.png\"],\n      [\"Solid Bus Comp FX\", \"1.4.11\", \"31 MB\", \"art/solid-bus-comp.png\"],\n      [\"Solid Dynamics FX\", \"1.4.11\", \"33 MB\", \"art/solid-dynamics.png\"],\n      [\"Solid EQ FX\", \"1.4.11\", \"36 MB\", \"art/solid-eq.png\"],\n      [\"Supercharger\", \"1.4.11\", \"64 MB\", \"art/supercharger.png\"],\n      [\"Supercharger GT\", \"1.4.11\", \"42 MB\", \"art/supercharger-gt.png\"],\n      [\"Transient Master FX\", \"1.4.11\", \"15 MB\", \"art/transient-master.png\"],\n    ];\n    return data.map((d, i) => ({ id: i, name: d[0], version: d[1], size: d[2], img: d[3] }));\n  }\n\n  boxStyle(on) {\n    const base = \"display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:4px;font-size:13px;line-height:1;cursor:pointer;flex:0 0 auto;transition:all .12s;\";\n    return on\n      ? base + \"background:#3b6fe0;border:1px solid #3b6fe0;color:#fff;\"\n      : base + \"background:transparent;border:1px solid #44444a;color:transparent;\";\n  }\n\n  renderVals() {\n    const all = this.state.products || [];\n    const q = this.state.query.trim().toLowerCase();\n    const products = q ? all.filter(p => p.name.toLowerCase().includes(q)) : all;\n    const checked = this.state.checked;\n    const total = products.length;\n    const numChecked = products.filter(p => checked[p.id]).length;\n    const allOn = total > 0 && numChecked === total;\n\n    const toggle = (id) => this.setState(s => ({ checked: { ...s.checked, [id]: !s.checked[id] } }));\n\n    return {\n      products: products.map(p => ({\n        ...p,\n        thumb: React.createElement('img', { src: (window.__resources && window.__resources[p.img]) || p.img, alt: p.name, style: { width: '100%', height: '100%', objectFit: 'cover', display: 'block' } }),\n        boxStyle: this.boxStyle(!!checked[p.id]),\n        mark: checked[p.id] ? \"✓\" : \"\",\n        toggle: () => toggle(p.id),\n        uninstall: (e) => { if (e) e.stopPropagation(); alert(\"Uninstall \" + p.name + \"?\"); },\n      })),\n      allMark: allOn ? \"✓\" : (numChecked > 0 ? \"–\" : \"\"),\n      allBoxStyle: this.boxStyle(allOn || numChecked > 0),\n      toggleAll: () => {\n        const next = {};\n        if (numChecked < total) products.forEach(p => { next[p.id] = true; });\n        this.setState({ checked: next });\n      },\n      selectLabel: allOn ? \"Deselect all\" : \"Select all\",\n      countLabel: numChecked > 0 ? numChecked + \" of \" + total + \" selected\" : total + \" products\",\n      query: this.state.query,\n      onSearch: (e) => this.setState({ query: e.target.value }),\n      clearSearch: () => this.setState({ query: \"\" }),\n      clearBtnStyle: \"position:absolute;right:8px;display:flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;color:#8a8a8e;cursor:pointer;\" + (this.state.query ? \"\" : \"visibility:hidden;\"),\n      uninstallSelected: () => {\n        if (numChecked === 0) return;\n        alert(\"Uninstall \" + numChecked + \" selected product(s)?\");\n      },\n      bulkBtnStyle: \"padding:8px 18px;border-radius:6px;font-size:13.5px;font-weight:500;font-family:inherit;cursor:\" + (numChecked ? \"pointer\" : \"not-allowed\") + \";border:1px solid \" + (numChecked ? \"#3b6fe0\" : \"#26262a\") + \";background:\" + (numChecked ? \"#3b6fe0\" : \"transparent\") + \";color:\" + (numChecked ? \"#fff\" : \"#55555a\") + \";\",\n      reload: () => {\n        this.setState({ spinning: true });\n        setTimeout(() => this.setState({ spinning: false }), 700);\n      },\n      spinStyle: this.state.spinning ? \"transition:transform .7s ease;transform:rotate(360deg);transform-origin:center;\" : \"transform-origin:center;\",\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
